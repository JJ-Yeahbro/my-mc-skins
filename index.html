<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Minecraft Skins Void Grid</title>
    <!-- skinview3d bundle v0.9.0 -->
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@0.9.0/bundles/skinview3d.bundle.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #000000;
            font-family: sans-serif;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h1 {
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .skins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1400px;
        }

        .skin-card {
            background: #050505;
            border: 1px solid #151515;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: border-color 0.3s ease;
        }

        .skin-card:hover {
            border-color: #333;
        }

        .skin-name {
            margin-top: 12px;
            font-size: 13px;
            font-weight: bold;
            color: #aaa;
            letter-spacing: 0.5px;
            text-align: center;
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <h1>SKINS VOID GRID</h1>

    <div class="skins-grid" id="void-grid"></div>

    <script src="skin-viewer.js"></script>
    <script>
        const mySkins = [
            "SKIN-1.png", "SKIN-2.png", "SKIN-3(current and preferred).png", 
            "SKIN-4.png", "SKIN-5.png", "SKIN-6.png", "SKIN-7.png", 
            "SKIN-8.png", "SKIN-9.png", "SKIN-10.png", "SKIN-11.png", 
            "SKIN-12.png", "SKIN-13.png", "SKIN-14.png", "SKIN-15.png",
            "SKIN-16.png", "SKIN-17.png", "SKIN-18.png", "SKIN-19.png", 
            "SKIN-20.png", "SKIN-21(Wither Skeleton).png"
        ];

        const gridContainer = document.getElementById('void-grid');

        mySkins.forEach((skinFile, index) => {
            const card = document.createElement('div');
            card.className = 'skin-card';

            const viewerId = `viewer-${index}`;
            const viewerDiv = document.createElement('div');
            viewerDiv.id = viewerId;

            const nameLabel = document.createElement('div');
            nameLabel.className = 'skin-name';
            nameLabel.innerText = skinFile.replace('.png', '').replace(/-/g, ' ');

            card.appendChild(viewerDiv);
            card.appendChild(nameLabel);
            gridContainer.appendChild(card);

            // Instantiate the viewer engine *after* appending elements to the active DOM
            const viewerInstance = new MinecraftSkinViewer(viewerId);
            viewerInstance.display(skinFile);
        });
    </script>

</body>
</html>
